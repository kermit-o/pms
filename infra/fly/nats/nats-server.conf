# NATS JetStream config para pms-nats en Fly.io.
#
# Single instance (suficiente para el piloto y hasta varios hoteles activos
# concurrentes). Volumen persistente en /data para los streams JetStream.
#
# La API consume via la red privada 6PN: pms-nats.internal:4222
# No se expone publico — solo tcp/4222 dentro de Fly + http/8222 para
# /healthz y /varz scrapeados por Prometheus.

server_name: pms-nats-1
listen: 0.0.0.0:4222

# HTTP monitoring (Prometheus + healthcheck Fly).
http: 0.0.0.0:8222

# JetStream — almacena los streams en disco. Configurado al provision time
# segun el tamano del volumen. Limites generosos para que NATS no recorte
# antes de tiempo; el stream pms-events del catalogo tiene retention 7d
# que se aplica per-stream (no aqui).
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 5GB
}

# Logs
debug: false
trace: false
logtime: true

# Connection limits — un piloto no genera mas de unos cientos de
# conexiones; capamos por seguridad ante un cliente que se vuelva loco.
max_connections: 1000
max_payload: 1MB
ping_interval: "30s"
ping_max: 2

# El cluster cluster{} se anade en V2 si pasamos a multi-instance HA. Para
# el piloto: 1 maquina + volumen persistente.
