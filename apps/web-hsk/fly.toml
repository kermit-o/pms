# fly.toml — pms-web-hsk en Fly.io (region primaria mad, ADR-023).
#
# Deploy desde la raiz del monorepo:
#   flyctl deploy -c apps/web-hsk/fly.toml --build-context .
#
# Primera vez:
#   flyctl apps create pms-web-hsk --org aubergine
#   flyctl secrets set -c apps/web-hsk/fly.toml \
#     NEXTAUTH_SECRET=$(openssl rand -hex 32) \
#     KEYCLOAK_CLIENT_SECRET=...
#
# El JWT HMAC de pairing (login QR) NO necesita secret aqui — la API lo
# valida con su propio PAIRING_SECRET.

app = "pms-web-hsk"
primary_region = "mad"
kill_signal = "SIGTERM"
kill_timeout = "15s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3002"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXTAUTH_URL = "https://hsk.aubergine.es"
  KEYCLOAK_ISSUER = "https://auth.aubergine.es/realms/pms"
  KEYCLOAK_CLIENT_ID = "pms-hsk"
  NEXT_PUBLIC_API_URL = "http://pms-api.internal:3000"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

[deploy]
  strategy = "rolling"
